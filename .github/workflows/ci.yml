# CI/CD — AP-101B FERRITE DISCIPLINE
#
# TRIGGER: PUSH TO MASTER, PULL REQUESTS.
# JOBS: CARGO TEST (+SEU 10K), CLIPPY (DENY WARNINGS), MIRI, NO_STD BUILD, RUSTFMT.
# MACHINE: UBUNTU-LATEST.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  PROPTEST_CASES: 10000

jobs:
  test:
    name: cargo test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo test --workspace -- --nocapture
      - name: SEU resilience (10k bit-flips)
        run: |
          cargo test -p ap101b-core prop_seu_detection -- --nocapture
          cargo test -p ap101s-cmos prop_burst_seu_detection -- --nocapture

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace -- -D warnings

  no-std:
    name: cargo build (no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p ferrite-core --no-default-features

  miri:
    name: cargo miri (ferrite-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test -p ferrite-core

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
