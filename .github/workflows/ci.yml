# CI/CD — AP-101B FERRITE DISCIPLINE
#
# TRIGGER: PUSH TO MASTER, PULL REQUESTS.
# JOBS: CARGO TEST, CLIPPY (DENY WARNINGS), MIRI (FERRITE-CORE ONLY), NO_STD BUILD.
# MACHINE: UBUNTU-LATEST. RUST: STABLE.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  PROPTEST_CASES: 10000

defaults:
  run:
    working-directory: codebase

jobs:
  test:
    name: cargo test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace -- -D warnings

  no-std:
    name: cargo build (no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p ferrite-core --no-default-features

  miri:
    name: cargo miri (ferrite-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri test -p ferrite-core
